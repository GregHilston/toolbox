# ~/.tmux.conf — portable tmux config (GNU Stow package: toolbox/dot/tmux)
# ─────────────────────────────────────────────────────────────────────────────
# Single source of truth for tmux, in plain portable syntax so it works on ANY
# machine, nix or not. Deployed by `stow` — automatically on nix hosts via the
# stowDotfiles activation in nixos/modules/programs/tui/zsh, and via
# `just stow tmux` elsewhere.
#
# Nix-only bits live in ~/.tmux.local.conf, generated by home-manager
# (nixos/modules/programs/tui/tmux) and sourced at the very bottom of this file.
# On non-nix machines that file is absent and the `source-file -q` line no-ops.
# ─────────────────────────────────────────────────────────────────────────────

# -----------
# Set Options
# -----------
set -g set-titles on
set -g set-titles-string "tmux:#I #W"
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1
set -g bell-action any
set -g display-panes-time 2000
set -g visual-activity on
set -g visual-bell on
setw -g aggressive-resize off
setw -g clock-mode-colour green
setw -g clock-mode-style 12

# Faster Escape response (helps vim/neovim inside tmux)
set -s escape-time 10

# Focus events (needed by some vim plugins to detect focus gain/loss)
set -g focus-events on

# Vi keybindings for copy mode and the status line
set -g mode-keys vi
set -g status-keys vi

# Mouse: scroll, select panes/windows, drag borders to resize
set -g mouse on

# -----------
# Terminal / colors
# -----------
# True color ("24-bit") support and proper terminal capabilities
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-overrides ",xterm-256color:RGB"

# Undercurl + colored underlines (e.g. zsh-autosuggestions / diagnostics styling)
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# Enable extended keys so terminals like Ghostty can pass through
# modified key sequences (e.g. Shift+Enter) to applications inside tmux
set -s extended-keys on
set -g extended-keys-format csi-u
set -as terminal-features 'xterm*:extkeys'

# --------
# Bindings
# --------
# Rearrange windows left/right with Ctrl+Shift+Arrow
# from https://superuser.com/a/552493
bind-key -n C-S-Left  swap-window -t -1\; select-window -t -1
bind-key -n C-S-Right swap-window -t +1\; select-window -t +1

# Split panes. Bind BOTH the intuitive keys (| and -) and the traditional tmux
# keys (% and "), so whichever you reach for just works. The key looks like the
# divider it creates:
#   side-by-side (left|right): |  and  %   -> split-window -h
#   stacked      (top-bottom): -  and  "   -> split-window -v
bind-key '|' split-window -h -c "#{pane_current_path}"
bind-key '%' split-window -h -c "#{pane_current_path}"
bind-key '-' split-window -v -c "#{pane_current_path}"
bind-key '"' split-window -v -c "#{pane_current_path}"

# Vim-aware pane navigation: Ctrl+h/j/k move between tmux panes AND vim splits.
# C-l is intentionally excluded so it still clears the screen; use prefix+arrows
# or prefix+o to reach the right-hand pane.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'

# Vim-aware pane navigation in copy mode (C-l excluded, see above)
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U

# Resize panes with Shift+Arrow
bind -n S-Left  resize-pane -L 5
bind -n S-Right resize-pane -R 5
bind -n S-Down  resize-pane -D 5
bind -n S-Up    resize-pane -U 5

# Reload this config with prefix + r
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# ----
# Tmux Plugin Manager (tpm) — https://github.com/tmux-plugins/tpm
# ----
# Portable plugin manager: works on any host once tpm is cloned to
# ~/.tmux/plugins/tpm. Inert until then. Install plugins with prefix + I.
# Alternative syntax to work with our ZSH oh-my-zsh, per
# https://github.com/gpakosz/.tmux/issues/228#issuecomment-472205869
set -g @tpm_plugins '          \
  tmux-plugins/tpm             \
  tmux-plugins/tmux-sensible   \
  tmux-plugins/tmux-continuum  \
  tmux-plugins/tmux-resurrect  \
  samoshkin/tmux-plugin-sysstat  \
'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Initialize tpm (keep near the bottom, just above the local overlay)
run '~/.tmux/plugins/tpm/tpm'

# ----
# Nix-only overlay (optional, portable-safe)
# ----
# On nix hosts, home-manager writes ~/.tmux.local.conf with nix/host-specific
# settings (e.g. default-shell pinned to the stable /run/current-system path).
# `-q` makes this a silent no-op where the file doesn't exist (non-nix hosts).
source-file -q ~/.tmux.local.conf
